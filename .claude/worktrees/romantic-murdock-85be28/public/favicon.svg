<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fundo do ticket -->
  <rect x="8" y="12" width="48" height="40" rx="4" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Linhas do ticket -->
  <line x1="16" y1="22" x2="48" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="30" x2="40" y2="30" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="38" x2="44" y2="38" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Código/número do ticket -->
  <circle cx="48" cy="20" r="8" fill="#ef4444" stroke="#991b1b" stroke-width="1.5"/>
  <text x="48" y="24" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">#</text>
  
  <!-- Borda perfurada (efeito de ticket) -->
  <circle cx="8" cy="32" r="3" fill="#ffffff"/>
  <circle cx="56" cy="32" r="3" fill="#ffffff"/>
</svg>
