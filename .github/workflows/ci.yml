name: CI

# Roda em todo push para dev e em PRs para main
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      # O client Supabase tem fallback de URL/anon key embutido,
      # então o build não exige env vars (Vercel injeta as reais no deploy).
      - name: Build
        run: bun run build

      - name: Check bundle size
        run: du -sh dist/assets/ 2>/dev/null || echo "No assets found"
