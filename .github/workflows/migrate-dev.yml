name: Migration — DEV

# Roda automaticamente em push para dev quando há arquivos de migration novos
# Ou manualmente via Actions → Run workflow
on:
  push:
    branches: [dev]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:
    inputs:
      confirm:
        description: "Confirma aplicar migrations no FlagHubDB-Dev? (yes)"
        required: true
        default: "no"

jobs:
  migrate-dev:
    name: Apply migrations → FlagHubDB-Dev
    runs-on: ubuntu-latest
    environment: dev # Usa o environment "dev" do GitHub com seus secrets

    steps:
      - name: Checkpoint de segurança
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm != 'yes'
        run: |
          echo "Confirmação necessária. Digite 'yes' no campo confirm."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link ao FlagHubDB-Dev
        run: supabase link --project-ref ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Aplicar migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}

      - name: Resumo
        run: echo "✅ Migrations aplicadas no FlagHubDB-Dev com sucesso."
