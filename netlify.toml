[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# ── Security Headers ────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Restrict referrer information leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable unused browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
    # Force HTTPS for 1 year (includeSubDomains, preload-ready)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content-Security-Policy
    # Note: 'unsafe-inline' required for Tailwind/shadcn inline styles;
    #       'unsafe-eval' required by Vite dev transforms in production bundles.
    #       Tighten to hash-based policy after a CSP audit with report-only mode.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://login.microsoftonline.com https://graph.microsoft.com; frame-src https://login.microsoftonline.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Immutable cache for hashed assets (Vite output)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
